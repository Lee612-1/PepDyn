seed: 42
output_dir: results/rmsf_full_4

data:
  lmdb_path: unibind_dataset.lmdb
  k_neighbors: 12
  prune_c_hydrogens: true

split:
  train_keys_path: train_keys.txt
  test_keys_path: test_keys.txt
  val_ratio_from_train: 0.05

model:
  hidden_dim: 128
  num_layers: 5
  dropout: 0.1

training:
  device: cuda
  batch_size: 8
  eval_batch_size: 1
  num_workers: 0
  epochs: 25
  normalization_max_graphs: 256
  learning_rate: 0.001
  weight_decay: 0.0001
